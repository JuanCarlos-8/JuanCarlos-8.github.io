<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Productivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../CSS/listas.css">
</head>
<body class="bg-[#f3f4f6] text-[#1f2937] min-h-screen antialiasedeflex flex-col justify-between p-4 md:p-8">

    <main class="max-w-6xl w-full mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 p-6 md:p-10 my-auto">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900">Workspace de Productividad</h1>
                <p class="text-sm text-gray-500 mt-1" id="extended-date"></p>
            </div>
            <button id="btn-calendar" class="flex items-center gap-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-xl transition-all shadow-sm shadow-blue-200">
                <span>Sincronizar Google Calendar</span>
            </button>
        </header>

        <nav class="mb-8">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Planificador Semanal</p>
            <div class="grid grid-cols-7 gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100" id="week-selector">
                </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6 lg:col-span-1">
                <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wide mb-4">Nueva Tarea</h3>
                    <form id="advanced-task-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">¿Qué tienes que hacer?</label>
                            <input type="text" id="task-title" placeholder="Ej. Estudiar para el examen" required
                                class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Hora Límite (Deadline)</label>
                            <input type="time" id="task-time" required
                                class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm transition-all">
                        </div>
                        <button type="submit" class="w-full bg-black text-white py-3 rounded-xl text-sm font-semibold hover:bg-gray-800 transition-colors shadow-md">
                            Añadir al Horario
                        </button>
                    </form>
                </div>

                <div class="bg-gray-900 text-white p-6 rounded-2xl shadow-inner">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4" id="summary-month-title">Métricas de Rendimiento</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                            <span class="text-xs text-gray-400">Completadas este mes</span>
                            <span class="text-lg font-bold" id="month-completed">0</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                            <span class="text-xs text-gray-400">Tareas Expiradas/Atrasadas</span>
                            <span class="text-lg font-bold text-red-400" id="month-expired">0</span>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs text-gray-400">Tasa de Eficiencia</span>
                                <span class="text-xs font-bold text-green-400" id="month-efficiency-pct">0%</span>
                            </div>
                            <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                                <div id="efficiency-bar" class="bg-green-400 h-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4">
                
                <div class="bg-gray-50 p-4 rounded-2xl flex flex-col h-[450px]">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wider flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span> En Tiempo
                        </h3>
                        <span id="count-pending" class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <ul id="list-pending" class="space-y-3 overflow-y-auto flex-1 pr-1 custom-scrollbar"></ul>
                </div>

                <div class="bg-red-50 p-4 rounded-2xl flex flex-col h-[450px]">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h3 class="text-sm font-bold text-red-700 uppercase tracking-wider flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span> Atrasadas
                        </h3>
                        <span id="count-expired" class="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <ul id="list-expired" class="space-y-3 overflow-y-auto flex-1 pr-1 custom-scrollbar"></ul>
                </div>

                <div class="bg-green-50 p-4 rounded-2xl flex flex-col h-[450px]">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h3 class="text-sm font-bold text-green-700 uppercase tracking-wider flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Hechas
                        </h3>
                        <span id="count-completed" class="text-xs bg-green-200 text-green-700 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <ul id="list-completed" class="space-y-3 overflow-y-auto flex-1 pr-1 custom-scrollbar"></ul>
                </div>

            </div>

        </div>
    </main>

    <footer class="text-center text-xs text-gray-400 mt-8 font-medium">
        Control Center &copy; 2026 — Diseñado para Alta Productividad Estudiantil
    </footer>

    <script type="module" src="./../JavaScript/listas.js"></script>
</body>
</html>
